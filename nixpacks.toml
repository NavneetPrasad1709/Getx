providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_24", "openssl"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@11.0.8 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @getx/database db:generate",
  "pnpm --filter @getx/api build"
]

[start]
cmd = "node apps/api/dist/main"
