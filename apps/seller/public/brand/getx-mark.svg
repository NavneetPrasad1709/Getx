<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="GETX" fill="none">
  <defs>
    <linearGradient id="x-front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="45%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="x-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="x-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="x-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="x-core" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#7DD3FC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0"/>
    </radialGradient>
    <filter id="x-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="#3B82F6" flood-opacity="0.55"/>
      <feComposite in2="b" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="32" cy="34" rx="26" ry="22" fill="url(#x-core)" opacity="0.55"/>

  <g filter="url(#x-glow)">
    <!-- bar A (NW->SE) bottom shadow face -->
    <polygon points="12,55 17.66,55 57.66,15 52,15" fill="url(#x-bottom)"/>
    <!-- bar B (NE->SW) bottom shadow face -->
    <polygon points="46.34,55 52,55 12,15 6.34,15" fill="url(#x-bottom)"/>

    <!-- bar A right side face (depth) -->
    <polygon points="54.83,49.17 57.66,52 17.66,52 14.83,54.83" fill="url(#x-side)"/>
    <polygon points="54.83,49.17 57.66,52 17.66,52 14.83,54.83" fill="url(#x-side)" opacity="0"/>

    <!-- bar A front face NW->SE -->
    <polygon points="9.17,14.83 14.83,9.17 54.83,49.17 49.17,54.83" fill="url(#x-front)"/>
    <!-- bar A top-left rim highlight -->
    <polygon points="9.17,14.83 14.83,9.17 18,12.34 12.34,18" fill="url(#x-rim)" opacity="0.85"/>

    <!-- bar B front face NE->SW -->
    <polygon points="49.17,9.17 54.83,14.83 14.83,54.83 9.17,49.17" fill="url(#x-front)"/>
    <!-- bar B top-right rim highlight -->
    <polygon points="49.17,9.17 54.83,14.83 51.66,18 45.83,12.34" fill="url(#x-rim)" opacity="0.85"/>

    <!-- center crossover diamond — brightest core -->
    <polygon points="32,26 38,32 32,38 26,32" fill="#F0F9FF" opacity="0.92"/>
    <polygon points="32,28 36,32 32,36 28,32" fill="#FFFFFF"/>

    <!-- edge ink lines for crispness -->
    <polygon points="9.17,14.83 14.83,9.17 54.83,49.17 49.17,54.83" fill="none" stroke="#0F172A" stroke-width="0.6" opacity="0.5"/>
    <polygon points="49.17,9.17 54.83,14.83 14.83,54.83 9.17,49.17" fill="none" stroke="#0F172A" stroke-width="0.6" opacity="0.5"/>
  </g>
</svg>
