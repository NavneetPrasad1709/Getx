<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" role="img" aria-label="GETX" fill="none">
  <defs>
    <linearGradient id="w-text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="w-text-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="w-front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="45%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="w-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="w-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="w-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="w-core" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#7DD3FC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0"/>
    </radialGradient>
    <filter id="w-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#3B82F6" flood-opacity="0.55"/>
      <feComposite in2="b" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- GET wordmark: chunky 3D-ish typography -->
  <g font-family="'Poppins',system-ui,sans-serif" font-weight="900" font-size="68" letter-spacing="-3">
    <text x="14" y="74" fill="url(#w-text-shadow)" opacity="0.7" transform="translate(3 3)">GET</text>
    <text x="14" y="74" fill="url(#w-text)">GET</text>
  </g>

  <!-- 3D X mark on the right -->
  <g transform="translate(204 12) scale(1.1)">
    <ellipse cx="32" cy="34" rx="26" ry="22" fill="url(#w-core)" opacity="0.55"/>

    <g filter="url(#w-glow)">
      <polygon points="12,55 17.66,55 57.66,15 52,15" fill="url(#w-bottom)"/>
      <polygon points="46.34,55 52,55 12,15 6.34,15" fill="url(#w-bottom)"/>

      <polygon points="9.17,14.83 14.83,9.17 54.83,49.17 49.17,54.83" fill="url(#w-front)"/>
      <polygon points="9.17,14.83 14.83,9.17 18,12.34 12.34,18" fill="url(#w-rim)" opacity="0.85"/>

      <polygon points="49.17,9.17 54.83,14.83 14.83,54.83 9.17,49.17" fill="url(#w-front)"/>
      <polygon points="49.17,9.17 54.83,14.83 51.66,18 45.83,12.34" fill="url(#w-rim)" opacity="0.85"/>

      <polygon points="32,26 38,32 32,38 26,32" fill="#F0F9FF" opacity="0.92"/>
      <polygon points="32,28 36,32 32,36 28,32" fill="#FFFFFF"/>

      <polygon points="9.17,14.83 14.83,9.17 54.83,49.17 49.17,54.83" fill="none" stroke="#0F172A" stroke-width="0.6" opacity="0.5"/>
      <polygon points="49.17,9.17 54.83,14.83 14.83,54.83 9.17,49.17" fill="none" stroke="#0F172A" stroke-width="0.6" opacity="0.5"/>
    </g>
  </g>
</svg>
