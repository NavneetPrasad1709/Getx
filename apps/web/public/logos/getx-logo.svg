    <g filter="url(#l-glow)">
      <polygon points="12,55 17.66,55 57.66,15 52,15" fill="url(#l-bottom)"/>
      <polygon points="46.34,55 52,55 12,15 6.34,15" fill="url(#l-bottom)"/>

