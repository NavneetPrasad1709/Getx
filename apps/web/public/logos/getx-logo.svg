  <g font-family="'Poppins',system-ui,sans-serif" font-weight="900" font-size="68" letter-spacing="-3">
    <text x="14" y="74" fill="url(#l-text-shadow)" opacity="0.6" transform="translate(2 2)">GET</text>
    <text x="14" y="74" fill="url(#l-text)">GET</text>
  </g>

  <g transform="translate(204 12) scale(1.1)">
