<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="GETX gaming marketplace hero">
  <defs>
    <radialGradient id="hero-bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C8FF" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#0088CC" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ctrl-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A3441"/>
      <stop offset="50%" stop-color="#141821"/>
      <stop offset="100%" stop-color="#050709"/>
    </linearGradient>
    <linearGradient id="ctrl-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="50%" stop-color="#00C8FF"/>
      <stop offset="100%" stop-color="#0088CC"/>
    </linearGradient>
    <radialGradient id="stick-shine" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="60%" stop-color="#0A0E16"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="cyan-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Backdrop glow -->
  <circle cx="300" cy="300" r="260" fill="url(#hero-bg-glow)"/>

  <!-- Orbital ring 1 (back) -->
  <ellipse cx="300" cy="320" rx="240" ry="40" fill="none" stroke="#00C8FF" stroke-width="1" stroke-dasharray="3 6" opacity="0.35"/>

  <!-- Orbital floating accent shards -->
  <g opacity="0.85">
    <circle cx="80" cy="240" r="8" fill="#7DF9FF" filter="url(#cyan-blur)"/>
    <circle cx="80" cy="240" r="4" fill="#FFFFFF"/>
    <circle cx="540" cy="320" r="10" fill="#FACC15" filter="url(#cyan-blur)"/>
    <circle cx="540" cy="320" r="5" fill="#FFD700"/>
    <circle cx="120" cy="450" r="7" fill="#F472B6" filter="url(#cyan-blur)"/>
    <circle cx="120" cy="450" r="3.5" fill="#FFE0F0"/>
  </g>

  <!-- Underglow ellipse -->
  <ellipse cx="300" cy="470" rx="180" ry="22" fill="#00C8FF" opacity="0.35" filter="url(#cyan-blur)"/>

  <!-- ============ CONTROLLER (centerpiece) ============ -->
  <g transform="translate(110 175)" filter="url(#soft-shadow)">
    <!-- Body shape -->
    <path d="M 50 110 C 50 50, 105 18, 158 38 L 220 60 C 245 70, 275 70, 300 60 L 362 38 C 415 18, 470 50, 470 110 L 450 230 C 442 270, 410 296, 368 296 L 332 296 L 260 200 L 188 296 L 152 296 C 110 296, 78 270, 70 230 Z"
          fill="url(#ctrl-body-grad)" stroke="#00C8FF" stroke-width="2.5"/>

    <!-- Top edge highlight -->
    <path d="M 50 110 C 50 50, 105 18, 158 38 L 220 60 C 245 70, 275 70, 300 60 L 362 38 C 415 18, 470 50, 470 110"
          fill="none" stroke="url(#ctrl-highlight)" stroke-width="3"/>

    <!-- Cyan X glow -->
    <line x1="135" y1="140" x2="385" y2="240" stroke="url(#cyan-glow)" stroke-width="14" stroke-linecap="round" opacity="0.45" filter="url(#cyan-blur)"/>
    <line x1="385" y1="140" x2="135" y2="240" stroke="url(#cyan-glow)" stroke-width="14" stroke-linecap="round" opacity="0.45" filter="url(#cyan-blur)"/>
    <line x1="135" y1="140" x2="385" y2="240" stroke="url(#cyan-glow)" stroke-width="9" stroke-linecap="round"/>
    <line x1="385" y1="140" x2="135" y2="240" stroke="url(#cyan-glow)" stroke-width="9" stroke-linecap="round"/>

    <!-- Left analog stick -->
    <circle cx="160" cy="162" r="32" fill="#050709" stroke="url(#cyan-glow)" stroke-width="3"/>
    <circle cx="160" cy="162" r="20" fill="url(#stick-shine)"/>
    <circle cx="153" cy="155" r="4" fill="#FFFFFF" opacity="0.55"/>

    <!-- Right analog stick -->
    <circle cx="360" cy="162" r="32" fill="#050709" stroke="url(#cyan-glow)" stroke-width="3"/>
    <circle cx="360" cy="162" r="20" fill="url(#stick-shine)"/>
    <circle cx="353" cy="155" r="4" fill="#FFFFFF" opacity="0.55"/>

    <!-- D-pad (left) -->
    <g transform="translate(108 78)" fill="#00C8FF">
      <rect x="0" y="9" width="32" height="9" rx="2" opacity="0.95"/>
      <rect x="11" y="-2" width="9" height="32" rx="2" opacity="0.95"/>
      <rect x="2" y="11" width="28" height="5" rx="1.5" fill="#7DF9FF" opacity="0.8"/>
    </g>

    <!-- Face buttons (right) -->
    <g transform="translate(394 90)">
      <circle cx="14" cy="0" r="5.5" fill="#00C8FF"/>
      <circle cx="28" cy="14" r="5.5" fill="#00C8FF" opacity="0.75"/>
      <circle cx="14" cy="28" r="5.5" fill="#00C8FF"/>
      <circle cx="0" cy="14" r="5.5" fill="#00C8FF" opacity="0.75"/>
    </g>

    <!-- Centre logo plate -->
    <g transform="translate(218 150)">
      <rect x="0" y="0" width="64" height="22" rx="5" fill="#050709" stroke="#00C8FF" stroke-width="1.2" opacity="0.85"/>
      <text x="32" y="16" text-anchor="middle" font-family="Poppins, system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="3" fill="url(#cyan-glow)">GETX</text>
    </g>

    <!-- Side LED bars -->
    <rect x="60" y="200" width="32" height="3" rx="1.5" fill="#00C8FF" opacity="0.7"/>
    <rect x="428" y="200" width="32" height="3" rx="1.5" fill="#00C8FF" opacity="0.7"/>
  </g>

  <!-- Sparkle highlights around controller -->
  <g fill="#FFFFFF" opacity="0.85">
    <path d="M 480 130 L 484 142 L 496 146 L 484 150 L 480 162 L 476 150 L 464 146 L 476 142 Z"/>
    <path d="M 100 380 L 103 388 L 111 391 L 103 394 L 100 402 L 97 394 L 89 391 L 97 388 Z"/>
  </g>
</svg>
