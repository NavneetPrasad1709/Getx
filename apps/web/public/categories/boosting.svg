<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="GetX boosting services key art">
  <defs>
    <radialGradient id="b-glow" cx="70%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FCAF17" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#FCAF17" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="100%" stop-color="#FCAF17"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="#000"/>
  <rect width="1600" height="1000" fill="url(#b-glow)"/>
  <!-- Perspective grid floor -->
  <g stroke="#FCAF17" opacity="0.22" stroke-width="1">
    <!-- Horizontals -->
    <line x1="0" y1="640" x2="1600" y2="640"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="0" y1="770" x2="1600" y2="770"/>
    <line x1="0" y1="850" x2="1600" y2="850"/>
    <line x1="0" y1="940" x2="1600" y2="940"/>
    <!-- Verticals converging on vanishing point -->
    <g>
      <line x1="0" y1="940" x2="800" y2="600"/>
      <line x1="200" y1="940" x2="800" y2="600"/>
      <line x1="400" y1="940" x2="800" y2="600"/>
      <line x1="600" y1="940" x2="800" y2="600"/>
      <line x1="800" y1="940" x2="800" y2="600"/>
      <line x1="1000" y1="940" x2="800" y2="600"/>
      <line x1="1200" y1="940" x2="800" y2="600"/>
      <line x1="1400" y1="940" x2="800" y2="600"/>
      <line x1="1600" y1="940" x2="800" y2="600"/>
    </g>
  </g>
  <!-- Bars -->
  <g transform="translate(280 720)">
    <rect x="0"   y="-120" width="100" height="120" fill="#262626" stroke="#FCAF17" stroke-width="2"/>
    <rect x="120" y="-220" width="100" height="220" fill="#3D3D3D" stroke="#FCAF17" stroke-width="2"/>
    <rect x="240" y="-340" width="100" height="340" fill="#665600" stroke="#FCAF17" stroke-width="2"/>
    <rect x="360" y="-470" width="100" height="470" fill="#A78112" stroke="#FCAF17" stroke-width="2"/>
    <rect x="480" y="-600" width="100" height="600" fill="url(#bar-grad)" stroke="#000" stroke-width="2"/>
    <!-- Labels on bars -->
    <text x="50" y="14" text-anchor="middle" fill="#FFF" opacity="0.5" font-family="ui-monospace, monospace" font-size="14" font-weight="700">LVL 30</text>
    <text x="170" y="14" text-anchor="middle" fill="#FFF" opacity="0.6" font-family="ui-monospace, monospace" font-size="14" font-weight="700">35</text>
    <text x="290" y="14" text-anchor="middle" fill="#FFF" opacity="0.7" font-family="ui-monospace, monospace" font-size="14" font-weight="700">40</text>
    <text x="410" y="14" text-anchor="middle" fill="#FFF" opacity="0.8" font-family="ui-monospace, monospace" font-size="14" font-weight="700">45</text>
    <text x="530" y="14" text-anchor="middle" fill="#000" font-family="ui-monospace, monospace" font-size="14" font-weight="700">50</text>
  </g>
  <!-- Diagonal arrow -->
  <g>
    <path d="M 280 720 L 1280 200" stroke="#FCAF17" stroke-width="14" stroke-linecap="square"/>
    <!-- Arrow head -->
    <polygon points="1280,200 1240,200 1280,180 1300,220 1280,260" fill="#FCAF17"/>
    <polygon points="1280,200 1220,200 1280,160" fill="#FCAF17"/>
  </g>
  <!-- "XP" label near arrow tail -->
  <g transform="translate(360 660)">
    <rect x="-50" y="-30" width="100" height="40" fill="#FCAF17"/>
    <text x="0" y="0" text-anchor="middle" fill="#000" font-family="Poppins, system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="3">XP</text>
  </g>
  <!-- Top right "+580%" -->
  <g transform="translate(1340 250)">
    <text x="0" y="0" text-anchor="end" fill="#FFF" font-family="Poppins, system-ui, sans-serif" font-size="92" font-weight="700" letter-spacing="2">+580%</text>
    <text x="0" y="32" text-anchor="end" fill="#FCAF17" font-family="ui-monospace, monospace" font-size="18" font-weight="700" letter-spacing="3">AVG XP / WEEK</text>
  </g>
  <rect y="640" width="1600" height="360" fill="url(#b-floor)"/>
</svg>
