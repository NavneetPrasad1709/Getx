<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="GetX trainer accounts key art">
  <defs>
    <radialGradient id="acc-glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FCAF17" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#FCAF17" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="acc-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="acc-card-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="#000"/>
  <rect width="1600" height="1000" fill="url(#acc-glow)"/>
  <!-- Diagonal yellow streaks -->
  <g stroke="#FCAF17" stroke-width="3" opacity="0.18">
    <line x1="-100" y1="900" x2="700" y2="100"/>
    <line x1="100" y1="950" x2="900" y2="150"/>
    <line x1="900" y1="950" x2="1700" y2="150"/>
    <line x1="700" y1="900" x2="1500" y2="100"/>
  </g>
  <!-- Star field -->
  <g fill="#FCAF17">
    <circle cx="240" cy="160" r="3" opacity="0.9"/>
    <circle cx="380" cy="240" r="2" opacity="0.7"/>
    <circle cx="1240" cy="180" r="3.5" opacity="0.9"/>
    <circle cx="1380" cy="280" r="2" opacity="0.7"/>
    <circle cx="160" cy="420" r="2.5" opacity="0.6"/>
    <circle cx="1480" cy="500" r="3" opacity="0.8"/>
  </g>
  <!-- Trainer card (foreground) -->
  <g transform="translate(800 540)">
    <rect x="-260" y="-260" width="520" height="500" rx="8" fill="url(#acc-card-grad)" stroke="#FCAF17" stroke-width="4"/>
    <!-- Yellow header bar -->
    <rect x="-260" y="-260" width="520" height="76" fill="#FCAF17"/>
    <text x="-220" y="-212" fill="#000" font-family="Poppins, system-ui, sans-serif" font-size="38" font-weight="700" letter-spacing="3">LVL 50 · VALOR</text>
    <text x="220" y="-212" text-anchor="end" fill="#000" font-family="ui-monospace, monospace" font-size="22" font-weight="700">★ 312</text>
    <!-- Avatar -->
    <circle cx="0" cy="-50" r="100" fill="#E10600"/>
    <circle cx="0" cy="-50" r="100" fill="none" stroke="#FFF" stroke-width="5"/>
    <path d="M -56 -50 a 56 56 0 0 1 112 0 Z" fill="#000" opacity="0.5"/>
    <circle cx="0" cy="-86" r="14" fill="#000"/>
    <!-- Name row -->
    <text x="0" y="100" text-anchor="middle" fill="#FFF" font-family="Poppins, system-ui, sans-serif" font-size="42" font-weight="700" letter-spacing="2">TRAINER_VALOR47</text>
    <!-- Stat chips -->
    <g transform="translate(0 140)">
      <rect x="-220" y="0" width="140" height="44" rx="4" fill="#0A0A0A" stroke="#FCAF17" stroke-width="2"/>
      <text x="-150" y="29" text-anchor="middle" fill="#FCAF17" font-family="ui-monospace, monospace" font-size="16" font-weight="700">SHINIES 312</text>
      <rect x="-70" y="0" width="140" height="44" rx="4" fill="#0A0A0A" stroke="#FCAF17" stroke-width="2"/>
      <text x="0" y="29" text-anchor="middle" fill="#FCAF17" font-family="ui-monospace, monospace" font-size="16" font-weight="700">LEG 18</text>
      <rect x="80" y="0" width="140" height="44" rx="4" fill="#0A0A0A" stroke="#FCAF17" stroke-width="2"/>
      <text x="150" y="29" text-anchor="middle" fill="#FCAF17" font-family="ui-monospace, monospace" font-size="16" font-weight="700">100% ×6</text>
    </g>
    <!-- Footer price -->
    <text x="0" y="220" text-anchor="middle" fill="#FFF" font-family="Poppins, system-ui, sans-serif" font-size="40" font-weight="700" letter-spacing="2">₹42,500</text>
  </g>
  <!-- Floor wash -->
  <rect y="600" width="1600" height="400" fill="url(#acc-floor)"/>
</svg>
