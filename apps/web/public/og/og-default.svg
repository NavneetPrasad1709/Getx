<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="og-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F1830"/>
      <stop offset="55%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#030610"/>
    </radialGradient>
    <linearGradient id="og-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="50%" stop-color="#00C8FF"/>
      <stop offset="100%" stop-color="#0088CC"/>
    </linearGradient>
    <linearGradient id="og-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B8C2CC"/>
    </linearGradient>
    <filter id="og-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.08" stroke="#00C8FF" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo lockup centered -->
  <g transform="translate(180 220)" filter="url(#og-glow)">
    <text x="0" y="120" font-family="'Poppins', system-ui, sans-serif" font-weight="800" font-size="180" letter-spacing="-8" fill="url(#og-white)">GET</text>
    <g transform="translate(440 0)">
      <path d="M 40 60 C 40 30, 70 16, 100 24 L 140 42 C 160 50, 180 50, 200 42 L 240 24 C 270 16, 300 30, 300 60 L 290 122 C 286 142, 270 156, 252 156 L 226 156 L 170 110 L 114 156 L 88 156 C 70 156, 54 142, 50 122 Z"
            fill="#0A0E16" stroke="#00C8FF" stroke-width="3"/>
      <line x1="90" y1="74" x2="250" y2="134" stroke="url(#og-cyan)" stroke-width="14" stroke-linecap="round"/>
      <line x1="250" y1="74" x2="90" y2="134" stroke="url(#og-cyan)" stroke-width="14" stroke-linecap="round"/>
      <circle cx="110" cy="92" r="20" fill="#050709" stroke="#00C8FF" stroke-width="3"/>
      <circle cx="110" cy="92" r="11" fill="#1A1F2A"/>
      <circle cx="230" cy="92" r="20" fill="#050709" stroke="#00C8FF" stroke-width="3"/>
      <circle cx="230" cy="92" r="11" fill="#1A1F2A"/>
    </g>
  </g>

  <!-- Tagline -->
  <text x="600" y="460" font-family="'Poppins', system-ui, sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="#FFFFFF" letter-spacing="0">
    Trade gaming. Without the trust tax.
  </text>
  <text x="600" y="510" font-family="'Poppins', system-ui, sans-serif" font-size="22" font-weight="400" text-anchor="middle" fill="#94A3B8" letter-spacing="2">
    VERIFIED SELLERS  ·  SECURE ESCROW  ·  INSTANT DELIVERY
  </text>

  <!-- Bottom-right URL -->
  <text x="1140" y="595" font-family="'Poppins', system-ui, sans-serif" font-size="18" font-weight="500" text-anchor="end" fill="#00C8FF" letter-spacing="2">
    GETX.GG
  </text>
</svg>
