# Railway deploy config for the GETX API.
# Uses the repo-root Dockerfile (multi-stage: deps → build → prod with `pnpm deploy`
# flattening transitive workspace deps into /deploy).
# Migrations are NOT run automatically — run `pnpm --filter @getx/database deploy:prod`
# from the Railway shell (or a CI step) before promoting a release.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/main"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
