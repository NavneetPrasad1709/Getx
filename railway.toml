# Railway deploy config for the GETX API.
# Uses the repo-root Dockerfile (multi-stage: deps → build → prod, non-root).
#
# ARCH-017 / INFRA-06: migrations run AUTOMATICALLY before each release via the
# preDeployCommand below (`prisma migrate deploy`). It runs in the deployed
# image with the service env and FAILS THE RELEASE if a migration errors, so a
# broken/un-applied migration can never reach traffic. Point DATABASE_URL at the
# DIRECT (non-pooled) Postgres URL for this step — PgBouncer transaction-pooling
# can break migration advisory locks.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/main"
preDeployCommand = "pnpm --filter @getx/database exec prisma migrate deploy"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
