# Railway deploy config for the GETX API.
# The Dockerfile handles the full build (deps → prisma generate → nest build → pnpm deploy).
# Migrations are NOT run automatically — run `pnpm --filter @getx/database deploy:prod`
# from the Railway shell (or a CI step) before promoting a release.

[deploy]
startCommand = "node dist/main.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
